<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Edição de Dados</title>
    <style>
        /* Estilos originais mantidos */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            max-width: 400px; 
            margin: 0 auto;
        }
        
        h2 { text-align: center; color: #333; margin-top: 20px; }
        
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        
        input, textarea, select { 
            width: 100%; 
            margin-bottom: 1rem; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 8px;
            font-size: 16px;
            background-color: white;
        }

        select:focus, input:focus, textarea:focus {
            outline: 2px solid #007bff;
            border-color: transparent;
        }
        
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>Solicitar Edição de Dados</h2>
    
    <form action="https://formspree.io/f/xnjyqkab" method="POST">
        
        <input type="hidden" name="_next" value="https://mkserafim.github.io/obrigado.html" />
        <input type="hidden" name="_subject" value="Solicitação de Edição de Dados - Perfil" />
        
        <label for="nome">Seu Nome Completo:</label>
        <input type="text" id="nome" name="nome" required placeholder="Nome conforme documento" />

        <label for="email">Seu E-mail:</label>
        <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com" />

        <label for="drt">Seu DRT:</label>
        <!-- Campo agora sem restrição de tamanho ou texto de ajuda limitante -->
        <input type="text" id="drt" name="drt" required placeholder="Digite o número do seu DRT" />

        <label for="cargo">Seu Cargo:</label>
        <input type="text" id="cargo" name="cargo" required placeholder="Ex: Prevenção e Perdas" />

        <label for="loja">Sua Loja:</label>
        <select id="loja" name="loja" required>
            <option value="" disabled selected>Selecione sua loja...</option>
            <option value="VVS">VVS - Hiper Vila Velha</option>
            <option value="JFO">JFO - Hiper Juiz de Fora</option>
            <option value="HMC">HMC - Hiper Macaé</option>
            <option value="HCG">HCG - Hiper Campos dos Goytacazes</option>
            <option value="BHP">BHP - Hiper Pampulha</option>
            <option value="RJD">RJD - Washington Luiz</option>
        </select>

        <label for="message">O que precisa ser corrigido?</label>
        <textarea id="message" name="message" rows="4" required placeholder="Descreva aqui o erro nos seus dados..."></textarea>

        <button type="submit">Enviar Solicitação</button>
    </form>

</body>
</html>
