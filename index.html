<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Contato</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea { width: 100%; margin-bottom: 1rem; padding: 0.5rem; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 0.7rem; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <h2>Entre em Contato</h2>
    <form action="https://formspree.io/f/mpqngqll" method="POST">
        <label for="email">Seu E-mail:</label>
        <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com" />

        <label for="message">Sua Mensagem:</label>
        <textarea id="message" name="message" required placeholder="Digite sua mensagem aqui..."></textarea>

        <button type="submit">Enviar Mensagem</button>
    </form>

</body>
</html>
