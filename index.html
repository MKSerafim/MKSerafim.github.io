<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            min-height: 100vh; 
            max-width: 400px; 
            margin: 0 auto;
        }
        
        h2 { text-align: center; }
        
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        
        input, textarea { 
            width: 100%; 
            margin-bottom: 1rem; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 8px;
            font-size: 16px; /* Tamanho de fonte ideal para não dar zoom no iPhone */
        }
        
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }
        
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>Entre em Contato</h2>
    
    <form action="https://formspree.io/f/mpqngqll" method="POST">
        <label for="email">Seu E-mail:</label>
        <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com" />

        <label for="message">Sua Mensagem:</label>
        <textarea id="message" name="message" rows="5" required placeholder="Digite sua mensagem aqui..."></textarea>

        <button type="submit">Enviar Mensagem</button>
    </form>

</body>
</html>
