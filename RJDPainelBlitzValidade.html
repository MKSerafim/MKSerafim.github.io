<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Painel Blitz - Prevenção</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #001F42; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Rajdhani', sans-serif;
            overflow: hidden; padding: 10px;
        }

        .tech-panel {
            width: 100%; max-width: 420px; background-color: #001F42;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
            background-size: 15px 15px, 15px 15px;
            border: 1px solid rgba(0, 180, 216, 0.4); border-radius: 12px;
            padding: 15px; position: relative;
            box-shadow: 0 0 25px rgba(0, 180, 216, 0.15), inset 0 0 20px rgba(0, 245, 255, 0.02);
            display: flex; flex-direction: column; gap: 12px;
        }

        .tech-panel::before, .tech-panel::after {
            content: ''; position: absolute; width: 16px; height: 16px; border: 2px solid #00f5ff;
        }
        .tech-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; border-top-left-radius: 12px; }
        .tech-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; border-bottom-right-radius: 12px; }

        .header h1 {
            color: #ffffff; font-size: 1.1rem; text-transform: uppercase;
            font-weight: 700; letter-spacing: 1.5px; line-height: 1.2;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.6);
            border-left: 3px solid #ff3333; padding-left: 8px;
        }

        .fonte-selector { display: flex; gap: 6px; margin-top: 10px; }
        .btn-toggle {
            flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 245, 255, 0.2);
            color: #88a8c8; padding: 5px; font-size: 0.68rem; font-weight: 700;
            border-radius: 4px; cursor: pointer; transition: all 0.2s;
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-toggle:hover { background: rgba(0, 245, 255, 0.08); color: #00f5ff; }
        .btn-toggle.active {
            background: rgba(0, 245, 255, 0.15); border-color: #00f5ff; color: #ffffff;
            box-shadow: 0 0 8px rgba(0, 245, 255, 0.3);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .content-grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 10px; }
        .left-col { display: flex; flex-direction: column; gap: 10px; position: relative; } 

        .box {
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 245, 255, 0.25);
            border-radius: 6px; padding: 10px; position: relative; overflow: hidden;
        }

        .box-title {
            color: #90e0ef; font-size: 0.78rem; font-weight: 700; margin-bottom: 8px;
            border-bottom: 1px dashed rgba(0, 245, 255, 0.3); padding-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .estoque-flex { display: flex; justify-content: space-between; align-items: center; }
        .estoque-data p { color: #a3b1c6; font-size: 0.75rem; }
        .estoque-data .num-total {
            color: #00f5ff; font-size: 1.5rem; font-weight: 700;
            font-family: 'Share Tech Mono', monospace; text-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
        }
        .alerta-txt {
            color: #ff3333; font-size: 0.7rem; font-weight: 700;
            margin-top: 6px; display: flex; align-items: center; gap: 4px;
        }

        .risco-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; text-align: center; }
        .risco-item { background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(0, 245, 255, 0.1); border-radius: 4px; padding: 6px 2px; }
        .risco-header { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; }
        
        .c-red { color: #ff3333; text-shadow: 0 0 5px rgba(255,51,51,0.4); }
        .c-yel { color: #ffcc00; text-shadow: 0 0 5px rgba(255,204,0,0.4); }
        .c-cya { color: #00f5ff; text-shadow: 0 0 5px rgba(0,245,255,0.4); }
        .risco-val { font-family: 'Share Tech Mono', monospace; color: #fff; font-size: 0.75rem; font-weight: 700; margin: 2px 0; }
        .micro-sys { font-family: 'Share Tech Mono', monospace; font-size: 0.52rem; display: block; margin-top: 3px; opacity: 0.8; }
        
        .m-red { color: rgba(255,51,51,0.7); }
        .m-yel { color: rgba(255,204,0,0.7); }
        .m-cya { color: rgba(0,245,255,0.7); }
        
        .right-col { display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px dashed rgba(0, 245, 255, 0.2); padding-left: 6px; }
        .radar-box { position: relative; width: 110px; height: 110px; margin-bottom: 12px; }
        .ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 1px solid transparent; }
        .ring-1 { border-top: 2px solid #00f5ff; border-bottom: 2px solid #00f5ff; animation: spin 3s linear infinite; }
        .ring-2 { border-left: 2px dashed rgba(0, 245, 255, 0.4); border-right: 2px dashed rgba(0, 245, 255, 0.4); transform: scale(0.85); animation: spinRev 5s linear infinite; }
        
        .shield {
            position: absolute; top: 15%; left: 20%; width: 60%; height: 70%; background: rgba(0, 180, 216, 0.15);
            clip-path: polygon(50% 0%, 100% 20%, 100% 60%, 50% 100%, 0% 60%, 0% 20%); border: 2px solid #00f5ff; display: flex; justify-content: center; align-items: center;
        }
        .scanner { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #fff; box-shadow: 0 0 8px #fff, 0 0 15px #00f5ff; animation: scanBar 1.8s linear infinite; }
        .barcode { width: 75%; height: 18px; background: repeating-linear-gradient(90deg, #00f5ff, #00f5ff 1px, transparent 1px, transparent 3px, #00f5ff 3px, #00f5ff 4px); opacity: 0.6; }
        .hex-data { font-family: 'Share Tech Mono', monospace; font-size: 0.45rem; color: #00f5ff; position: absolute; bottom: 8px; opacity: 0.8; }

        .btn-analise {
            background: rgba(0, 245, 255, 0.08); border: 1px solid #00f5ff; color: #00f5ff;
            padding: 2px 8px; font-size: 0.68rem; font-weight: 700; border-radius: 4px;
            box-shadow: 0 0 6px rgba(0, 245, 255, 0.3); margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
        }
        .btn-analise:hover { background: rgba(0, 245, 255, 0.2); box-shadow: 0 0 10px rgba(0, 245, 255, 0.5); }

        .status-dot { display: inline-block; width: 5px; height: 5px; background: #00ff66; border-radius: 50%; box-shadow: 0 0 8px #00ff66; margin-right: 4px; }
        .status-text { color: #00ff66; font-size: 0.62rem; font-weight: 700; display: flex; align-items: center; }
        .criterio { color: #88a8c8; font-size: 0.58rem; margin-top: 2px; text-transform: uppercase; font-weight: bold; }
        .timer-update { font-family: 'Share Tech Mono', monospace; color: #00b4d8; font-size: 0.55rem; margin-top: 4px; font-weight: bold; }

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 31, 66, 0.85);
            z-index: 10; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            backdrop-filter: blur(3px);
        }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .spinner-circle {
            width: 35px; height: 35px; border: 3px solid rgba(0, 245, 255, 0.15);
            border-top: 3px solid #00f5ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 12px;
        }
        .loading-overlay p {
            color: #00f5ff; font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem; letter-spacing: 1px; animation: pulseText 1.5s infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinRev { 100% { transform: scale(0.85) rotate(-360deg); } }
        @keyframes scanBar { 0% { top: -10%; } 100% { top: 110%; } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="tech-panel">
        <div class="header">
            <h1>Monitoramento Tático<br>BLITZ - Prevenção</h1>
            <div class="fonte-selector">
                <button class="btn-toggle active" id="btn-PGC" onclick="mudarFonte('PGC')">BLITZ PGC</button>
                <button class="btn-toggle" id="btn-PRC" onclick="mudarFonte('PRC')">BLITZ PRC</button>
            </div>
        </div>

        <div class="content-grid">
            <div class="left-col">
                
                <div class="loading-overlay" id="loading-screen">
                    <div class="spinner-circle"></div>
                    <p>EXTRAINDO DADOS...</p>
                </div>

                <div class="box">
                    <div class="box-title">Visão Geral da Blitz</div>
                    <div class="estoque-flex">
                        <div class="estoque-data">
                            <p>Total de Itens Auditados:</p>
                            <div class="num-total" id="din-total">0</div>
                        </div>
                        <div style="width: 40px; height: 40px;">
                            <svg viewBox="0 0 36 36">
                                <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(0,245,255,0.08)" stroke-width="2.5" />
                                <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831" fill="none" stroke="#ff3333" stroke-width="2.5" stroke-dasharray="40, 100" />
                            </svg>
                        </div>
                    </div>
                    <div class="alerta-txt">
                        <span style="display:inline-block; width:6px; height:6px; background:#ff3333; border-radius:50%;"></span>
                        Produtos Já Vencidos: <span id="din-alerta">0</span>
                    </div>
                </div>

                <div class="box">
                    <div class="box-title">Separação por Status Real</div>
                    <div class="risco-grid">
                        <div class="risco-item" style="border: 1px solid rgba(255,51,51,0.25);">
                            <div class="risco-header c-red">VENCIDOS</div>
                            <div class="risco-val c-red" id="din-r1">0</div>
                            <span class="micro-sys m-red">CRÍTICO</span>
                        </div>

                        <div class="risco-item" style="border: 1px solid rgba(255,204,0,0.25);">
                            <div class="risco-header c-yel">PRÓXIMOS</div>
                            <div class="risco-val c-yel" id="din-r2">0</div>
                            <span class="micro-sys m-yel">ATENÇÃO</span>
                        </div>

                        <div class="risco-item" style="border: 1px solid rgba(0,245,255,0.25);">
                            <div class="risco-header c-cya">ÚLTIMA</div>
                            <div class="risco-val c-cya" id="din-r3">--</div>
                            <span class="micro-sys m-cya">DATA REG.</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="radar-box">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <div class="shield"><div class="scanner"></div><div class="barcode"></div></div>
                    <div class="hex-data" id="hex-code">0x0000</div>
                </div>

                <div class="btn-analise" onclick="forcarSincronizacao()">FORÇAR SYNC</div>
                <div class="status-text" id="status-conexao"><span class="status-dot"></span>INICIANDO...</div>
                <div class="timer-update" id="contador-tempo">AUTO-SYNC: 30s</div>
                <div class="criterio" id="din-origem">SYS: BLITZ PGC</div>
            </div>
        </div>
    </div>

    <script>
        const fontesDados = {
            PGC: 'https://script.google.com/macros/s/AKfycbylDwN5Gi4RoqfxJNv_6Qtkqzqkf-pXDkBGJ3fHYv5xKLaR2RNu20QiDyup3yNDLBb5Kg/exec?func=ReadAll2',
            PRC: 'https://script.google.com/macros/s/AKfycbylDwN5Gi4RoqfxJNv_6Qtkqzqkf-pXDkBGJ3fHYv5xKLaR2RNu20QiDyup3yNDLBb5Kg/exec?func=ReadAll3'
        };
        
        let fonteAtual = 'PGC'; 
        let tempoRestante = 30;
        const DIAS_PARA_CONSIDERAR_PROXIMO = 15; 

        function tratarDataComPonto(valor) {
            if (!valor) return null;
            let texto = String(valor).trim().replace(/^\./, '').toUpperCase();
            if (texto === "" || texto.includes("SEM DATA")) return null;

            if (texto.includes('/')) {
                let partes = texto.split('/');
                if (partes.length >= 3) {
                    let dia = parseInt(partes[0], 10);
                    let mes = parseInt(partes[1], 10) - 1; 
                    let anoBruto = partes[2].split(' ')[0];
                    let ano = parseInt(anoBruto, 10);
                    return new Date(ano, mes, dia);
                }
            }
            let dataTentativa = new Date(texto);
            return isNaN(dataTentativa.getTime()) ? null : dataTentativa;
        }

        async function buscarDados() {
            const statusEl = document.getElementById('status-conexao');
            const contadorEl = document.getElementById('contador-tempo');
            const loadingScreen = document.getElementById('loading-screen'); 
            
            try {
                loadingScreen.classList.add('active'); 
                statusEl.innerHTML = '<span class="status-dot" style="background:#ffcc00; box-shadow:0 0 8px #ffcc00;"></span>CONECTANDO...';
                statusEl.style.color = '#ffcc00';
                contadorEl.innerText = 'PROCESSANDO...';
                
                const urlCompleta = `${fontesDados[fonteAtual]}&_ts=${new Date().getTime()}`;
                const response = await fetch(urlCompleta);
                if (!response.ok) throw new Error("Erro HTTP");
                
                const textData = await response.text();
                const linhas = textData.split('\n');
                
                let qtdVencidos = 0;
                let qtdProximos = 0;
                let dataMaisRecente = new Date(0); // Data inicial bem antiga
                let totalItens = 0;

                const hoje = new Date();
                hoje.setHours(0,0,0,0);

                for (let i = 1; i < linhas.length; i++) {
                    const linhaBruta = linhas[i].trim();
                    if (!linhaBruta) continue; 
                    
                    totalItens++; 
                    const colunas = linhaBruta.split(',');
                    
                    // Coluna E (índice 4) para validade
                    let validadeBruta = colunas[4] ? colunas[4] : "";
                    // Coluna H (índice 7) para data da blitz (POSTADO)
                    let postadoBruta = colunas[7] ? colunas[7] : "";
                    
                    // Verifica validade
                    let dataValidade = tratarDataComPonto(validadeBruta);
                    if (dataValidade) {
                        dataValidade.setHours(0,0,0,0);
                        let diferencaMili = dataValidade.getTime() - hoje.getTime();
                        let diferencaDias = Math.ceil(diferencaMili / (1000 * 60 * 60 * 24));
                        if (diferencaDias < 0) qtdVencidos++;
                        else if (diferencaDias <= DIAS_PARA_CONSIDERAR_PROXIMO) qtdProximos++;
                    }

                    // Verifica data da Blitz (Coluna H) para achar a mais recente
                    let dataPostado = tratarDataComPonto(postadoBruta);
                    if (dataPostado && dataPostado > dataMaisRecente) {
                        dataMaisRecente = dataPostado;
                    }
                }

                document.getElementById('din-total').innerText = totalItens;
                document.getElementById('din-alerta').innerText = qtdVencidos;
                document.getElementById('din-r1').innerText = qtdVencidos;
                document.getElementById('din-r2').innerText = qtdProximos;
                
                // Exibe a data mais recente formatada ou "--" se não achar
                if (dataMaisRecente.getTime() === 0) {
                    document.getElementById('din-r3').innerText = "--";
                } else {
                    let d = ("0" + dataMaisRecente.getDate()).slice(-2);
                    let m = ("0" + (dataMaisRecente.getMonth() + 1)).slice(-2);
                    document.getElementById('din-r3').innerText = `${d}/${m}`;
                }

                statusEl.innerHTML = '<span class="status-dot"></span>SINCRO OK';
                statusEl.style.color = '#00ff66';

            } catch (error) {
                console.error("Erro tático:", error);
                statusEl.innerHTML = '<span class="status-dot" style="background:#ff3333; box-shadow:0 0 8px #ff3333;"></span>FALHA NA REDE';
                statusEl.style.color = '#ff3333';
            } finally {
                loadingScreen.classList.remove('active');
            }
            tempoRestante = 30;
        }

        function mudarFonte(novaFonte) {
            if (fonteAtual === novaFonte) return;
            fonteAtual = novaFonte;
            document.getElementById('btn-PGC').classList.remove('active');
            document.getElementById('btn-PRC').classList.remove('active');
            document.getElementById(`btn-${novaFonte}`).classList.add('active');
            document.getElementById('din-origem').innerText = `SYS: BLITZ ${novaFonte}`;
            forcarSincronizacao();
        }

        function atualizarRelogio() {
            const contadorEl = document.getElementById('contador-tempo');
            if (contadorEl.innerText !== 'PROCESSANDO...') {
                tempoRestante--;
                contadorEl.innerText = `AUTO-SYNC: ${tempoRestante}s`;
                if (tempoRestante <= 0) buscarDados();
            }
        }

        function forcarSincronizacao() {
            tempoRestante = 30;
            buscarDados();
        }

        setInterval(() => {
            const hex = "0123456789ABCDEF";
            let code = "0x";
            for(let i=0; i<4; i++) code += hex.charAt(Math.floor(Math.random() * 16));
            document.getElementById('hex-code').innerText = code;
        }, 250);

        window.onload = () => {
            buscarDados();
            setInterval(atualizarRelogio, 1000);
        };
    </script>
</body>
</html>
