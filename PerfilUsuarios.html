<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão de Colaboradores</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        body { background: #001F42; color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: rgba(0, 245, 255, 0.05); border: 1px solid rgba(0, 245, 255, 0.3); padding: 20px; border-radius: 10px; text-align: center; }
        .card h3 { color: #00f5ff; font-size: 0.9rem; text-transform: uppercase; margin: 0; }
        .card p { font-size: 2rem; font-weight: 700; margin: 10px 0 0 0; }

        /* User List Grid */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .user-card { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .user-card img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #00f5ff; }
        .user-info h4 { margin: 0; font-size: 1.1rem; }
        .user-info span { font-size: 0.8rem; color: #aaa; }
        .user-info .store-tag { display: block; color: #00f5ff; font-weight: 600; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel de Gestão de Colaboradores</h1>
    
    <div class="stats-grid" id="stats-container">
        </div>

    <div class="user-grid" id="user-list">
        </div>
</div>

<script>
    const TABLE_ID = "180827";
    const TOKEN = "x6rXtkpcBaAYIER6MMDo6Lfd0RSS28Ey";
    const URL = `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=true`;

    async function carregarDados() {
        try {
            const response = await fetch(URL, {
                headers: { 'Authorization': `Token ${TOKEN}` }
            });
            const data = await response.json();
            processarDados(data.results);
        } catch (e) {
            console.error("Erro ao carregar Baserow:", e);
        }
    }

    function processarDados(usuarios) {
        const statsContainer = document.getElementById('stats-container');
        const userList = document.getElementById('user-list');
        
        // 1. Calcular Totais
        const totalColaboradores = usuarios.length;
        const lojasUnicas = new Set(usuarios.map(u => u.Loja));
        const totalLojas = lojasUnicas.size;

        // 2. Renderizar Stats
        statsContainer.innerHTML = `
            <div class="card"><h3>Colaboradores</h3><p>${totalColaboradores}</p></div>
            <div class="card"><h3>Total de Lojas</h3><p>${totalLojas}</p></div>
        `;

        // 3. Renderizar Lista de Usuários
        userList.innerHTML = usuarios.map(u => `
            <div class="user-card">
                <img src="${u.Foto}" onerror="this.src='https://via.placeholder.com/50'">
                <div class="user-info">
                    <h4>${u.Nome || "Sem Nome"}</h4>
                    <span class="store-tag">${u.Loja}</span>
                    <span>${u.Cargo}</span>
                </div>
            </div>
        `).join('');
    }

    carregarDados();
</script>
</body>
</html>
