<script>
    const TABLE_ID = "180827"; // Verifique se este é o ID da tabela certa
    const TOKEN = "x6rXtkpcBaAYIER6MMDo6Lfd0RSS28Ey";
    const URL = `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=true`;

    async function carregarDados() {
        const userList = document.getElementById('user-list');
        try {
            const response = await fetch(URL, {
                headers: { 'Authorization': `Token ${TOKEN}` }
            });
            
            if (!response.ok) throw new Error(`Erro na API: ${response.status}`);
            
            const data = await response.json();
            console.log("Dados recebidos do Baserow:", data.results); // VERIFIQUE ISSO NO CONSOLE F12
            
            if (data.results && data.results.length > 0) {
                processarDados(data.results);
            } else {
                userList.innerHTML = "<p>Nenhum dado encontrado nesta tabela.</p>";
            }
        } catch (e) {
            console.error("Erro crítico:", e);
            userList.innerHTML = `<p style="color:red">Erro ao carregar: ${e.message}. Verifique o Console (F12).</p>`;
        }
    }

    function processarDados(usuarios) {
        const statsContainer = document.getElementById('stats-container');
        const userList = document.getElementById('user-list');
        
        const totalColaboradores = usuarios.length;
        // Usa Set para contar lojas únicas (considerando que a coluna chama 'Loja')
        const lojasUnicas = new Set(usuarios.map(u => u.Loja || "Sem Loja"));
        const totalLojas = lojasUnicas.size;

        statsContainer.innerHTML = `
            <div class="card"><h3>Colaboradores</h3><p>${totalColaboradores}</p></div>
            <div class="card"><h3>Total de Lojas</h3><p>${totalLojas}</p></div>
        `;

        userList.innerHTML = usuarios.map(u => `
            <div class="user-card">
                <img src="${u.Foto || 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
                <div class="user-info">
                    <h4>${u.Nome || u.Email || "Sem Nome"}</h4>
                    <span class="store-tag">${u.Loja || "Sem Loja"}</span>
                    <span>${u.Cargo || "Cargo não definido"}</span>
                </div>
            </div>
        `).join('');
    }

    carregarDados();
</script>
