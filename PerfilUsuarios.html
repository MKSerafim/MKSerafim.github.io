<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento Tático - Equipe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #001226;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(rgba(0, 245, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 245, 255, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* --- TELA DE CARREGAMENTO ISOLADA --- */
        #status-display {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
            position: absolute;
            top: 0; left: 0;
            background-color: #001226;
            z-index: 9999;
        }

        .spinner {
            width: 70px; height: 70px;
            border: 4px solid rgba(0, 245, 255, 0.1);
            border-top: 4px solid #00f5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
            margin-bottom: 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loader-text {
            color: #00f5ff; font-family: 'Share Tech Mono', monospace; font-size: 1.2rem;
            letter-spacing: 2px; animation: pulse 1.5s infinite; text-transform: uppercase;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(0, 245, 255, 0.8); } 50% { opacity: 0.4; text-shadow: none; } }

        /* --- BOTÃO DE RETORNO TÁTICO --- */
        .btn-retornar {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0, 31, 66, 0.6);
            color: #00f5ff;
            border: 1px solid rgba(0, 245, 255, 0.3);
            padding: 8px 20px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        .btn-retornar:hover, .btn-retornar:active {
            background: rgba(0, 245, 255, 0.15);
            border-color: #00f5ff;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
            transform: translateX(-3px);
        }
        .btn-retornar svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- CABEÇALHO DO PAINEL --- */
        .header {
            border: 1px solid rgba(0, 245, 255, 0.2);
            background: rgba(0, 31, 66, 0.5);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            position: relative;
        }
        .header::before {
            content: ''; position: absolute; left: 0; top: 20%; height: 60%; width: 4px; background: #00f5ff; box-shadow: 0 0 10px #00f5ff;
        }
        .header h1 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; }

        /* --- Grid de Resumos --- */
        .grid-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .card-stat {
            background: rgba(0, 20, 40, 0.6); border: 1px solid rgba(0, 245, 255, 0.15);
            padding: 20px; border-radius: 6px; text-align: center; position: relative;
        }
        .card-stat h3 { font-size: 0.9rem; color: #88a8c8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .card-stat .num { font-family: 'Share Tech Mono', monospace; font-size: 2.8rem; color: #00f5ff; text-shadow: 0 0 10px rgba(0, 245, 255, 0.4); }

        /* --- Seções de Lojas --- */
        .loja-box {
            background: rgba(0, 25, 51, 0.4); border: 1px solid rgba(0, 180, 216, 0.25);
            border-radius: 8px; padding: 20px; margin-bottom: 25px;
        }
        .loja-title-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dashed rgba(0, 245, 255, 0.2); padding-bottom: 10px; margin-bottom: 20px;
        }
        .loja-title-bar h2 { color: #00f5ff; font-size: 1.4rem; text-transform: uppercase; }
        .counter-badge {
            background: rgba(0, 245, 255, 0.1); border: 1px solid #00f5ff;
            color: #fff; padding: 3px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: bold;
        }

        /* --- Grid de Usuários --- */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .user-card {
            background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px; padding: 15px; display: flex; align-items: center; gap: 15px;
            transition: all 0.25s ease;
        }
        .user-card:hover { border-color: #00f5ff; background: rgba(0, 245, 255, 0.04); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 245, 255, 0.1); }
        
        .avatar img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid #88a8c8; background: #001226; }
        .info { display: flex; flex-direction: column; min-width: 0; }
        .info .name { font-size: 1.1rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info .role { font-size: 0.85rem; color: #00b4d8; font-weight: bold; text-transform: uppercase; margin-top: 2px; }
        .info .drt { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: #708fa6; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="status-display">
        <div class="spinner"></div>
        <div class="loader-text" id="loader-msg">Estabelecendo conexão segura...</div>
    </div>

    <div id="main-content" class="container" style="display: none;">
        
        <button class="btn-retornar" onclick="voltarAoApp()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Retornar
        </button>
        
        <div class="header">
            <h1>Monitoramento Tático de Equipe</h1>
        </div>

        <div class="grid-stats" id="stats-summary"></div>
        
        <div id="lojas-render-target"></div>
        
    </div>

    <script>
        // CREDENCIAIS DA API
        let CONFIG = {
            TABLE_ID: "180827",
            TOKEN: "x6rXtkpcBaAYlER6MMDo6Lfd0RSS28Ey" 
        };

        const statusDisplay = document.getElementById('status-display');
        const loaderMsg = document.getElementById('loader-msg');
        const mainContent = document.getElementById('main-content');

        const mensagensCarregamento = [
            "Autenticando credenciais...",
            "Sincronizando banco de dados...",
            "Processando organograma das lojas..."
        ];

        // FUNÇÃO QUE MANDA O COMANDO PARA O KODULAR
        function voltarAoApp() {
            if (window.AppInventor) {
                // Envia a palavra mágica para o Kodular interceptar
                window.AppInventor.setWebViewString("VoltarLoja");
            } else {
                // Se for testado no navegador do PC, só avisa
                alert("Simulando o clique! No Kodular, isso abrirá a tela Loja.");
            }
        }

        async function puxarDadosServidor() {
            try {
                statusDisplay.style.display = 'flex';
                mainContent.style.display = 'none';
                
                loaderMsg.innerText = mensagensCarregamento[0];
                setTimeout(() => { if(statusDisplay.style.display === 'flex') loaderMsg.innerText = mensagensCarregamento[1]; }, 600);

                const url = `https://api.baserow.io/api/database/rows/table/${CONFIG.TABLE_ID}/?user_field_names=true&size=100`;
                
                const response = await fetch(url, {
                    method: "GET",
                    headers: { 'Authorization': `Token ${CONFIG.TOKEN}` }
                });

                if (!response.ok) throw new Error(`Status: ${response.status}`);

                const data = await response.json();
                
                statusDisplay.style.display = 'none';
                renderizarPainel(data.results || []);

            } catch (err) {
                statusDisplay.innerHTML = `
                    <h3 style="color:#ff3333; margin-bottom: 10px;">⚠️ Falha na Comunicação</h3>
                    <p style="color:#aaa;">Verifique sua conexão e tente novamente.</p>
                `;
            }
        }

        function renderizarPainel(registros) {
            if(registros.length === 0) {
                statusDisplay.style.display = 'flex';
                statusDisplay.innerHTML = `<div class="loader-text" style="animation: none;">NENHUM COLABORADOR ENCONTRADO.</div>`;
                return;
            }

            const mapaLojas = {};
            let contagemTotal = 0;

            registros.forEach(item => {
                const local = item.Loja ? item.Loja.trim() : "LOJA NÃO DEFINIDA";
                if (!mapaLojas[local]) mapaLojas[local] = [];
                mapaLojas[local].push(item);
                contagemTotal++;
            });

            document.getElementById('stats-summary').innerHTML = `
                <div class="card-stat"><h3>Total de Colaboradores</h3><div class="num">${contagemTotal}</div></div>
                <div class="card-stat"><h3>Unidades Conectadas</h3><div class="num">${Object.keys(mapaLojas).length}</div></div>
            `;

            let htmlHTML = "";
            Object.keys(mapaLojas).sort().forEach(nomeLoja => {
                const equipe = mapaLojas[nomeLoja];
                htmlHTML += `
                    <div class="loja-box">
                        <div class="loja-title-bar">
                            <h2>${nomeLoja}</h2>
                            <div class="counter-badge">${equipe.length} INTEGRANTE(S)</div>
                        </div>
                        <div class="user-grid">
                `;

                equipe.forEach(colab => {
                    const displayNome = colab.Nome || colab.Email || "Identificação Pendente";
                    const displayCargo = colab.Cargo || "Cargo não informado";
                    const displayDRT = colab.DRT ? `DRT: ${colab.DRT}` : "Sem Registro DRT";
                    const fotoValida = colab.Foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayNome)}&background=002347&color=00f5ff&bold=true`;

                    htmlHTML += `
                        <div class="user-card">
                            <div class="avatar">
                                <img src="${fotoValida}" onerror="this.src='https://ui-avatars.com/api/?name=Erro&background=ff3333&color=fff'">
                            </div>
                            <div class="info">
                                <div class="name">${displayNome}</div>
                                <div class="role">${displayCargo}</div>
                                <div class="drt">${displayDRT}</div>
                            </div>
                        </div>
                    `;
                });

                htmlHTML += `</div></div>`;
            });

            document.getElementById('lojas-render-target').innerHTML = htmlHTML;
            mainContent.style.display = 'block'; 
        }

        window.onload = puxarDadosServidor;
    </script>
</body>
</html>
