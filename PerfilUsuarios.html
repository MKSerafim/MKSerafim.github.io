<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento Tático - Equipe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #001226;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            padding: 20px;
            background-image: linear-gradient(rgba(0, 245, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 245, 255, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            border: 1px solid rgba(0, 245, 255, 0.2);
            background: rgba(0, 31, 66, 0.5);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            position: relative;
        }
        .header::before {
            content: ''; position: absolute; left: 0; top: 20%; height: 60%; width: 4px; background: #00f5ff; box-shadow: 0 0 10px #00f5ff;
        }
        .header h1 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; }

        /* Grid de Resumos */
        .grid-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .card-stat {
            background: rgba(0, 20, 40, 0.6); border: 1px solid rgba(0, 245, 255, 0.15);
            padding: 20px; border-radius: 6px; text-align: center; position: relative;
        }
        .card-stat h3 { font-size: 0.9rem; color: #88a8c8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .card-stat .num { font-family: 'Share Tech Mono', monospace; font-size: 2.8rem; color: #00f5ff; text-shadow: 0 0 10px rgba(0, 245, 255, 0.4); }

        /* Seções de Lojas */
        .loja-box {
            background: rgba(0, 25, 51, 0.4); border: 1px solid rgba(0, 180, 216, 0.25);
            border-radius: 8px; padding: 20px; margin-bottom: 25px;
        }
        .loja-title-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dashed rgba(0, 245, 255, 0.2); padding-bottom: 10px; margin-bottom: 20px;
        }
        .loja-title-bar h2 { color: #00f5ff; font-size: 1.4rem; text-transform: uppercase; }
        .counter-badge {
            background: rgba(0, 245, 255, 0.1); border: 1px solid #00f5ff;
            color: #fff; padding: 3px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: bold;
        }

        /* Grid de Usuários */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .user-card {
            background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px; padding: 15px; display: flex; align-items: center; gap: 15px;
            transition: all 0.25s ease;
        }
        .user-card:hover { border-color: #00f5ff; background: rgba(0, 245, 255, 0.04); transform: translateY(-1px); }
        
        .avatar img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid #88a8c8; background: #001226; }
        .info { display: flex; flex-direction: column; min-width: 0; }
        .info .name { font-size: 1.1rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info .role { font-size: 0.85rem; color: #00b4d8; font-weight: bold; text-transform: uppercase; margin-top: 2px; }
        .info .drt { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: #708fa6; margin-top: 4px; }

        /* Status & Debugger Tool */
        .status-panel { text-align: center; padding: 40px; font-size: 1.2rem; color: #ffcc00; }
        
        .debug-container {
            background: rgba(255, 51, 51, 0.08); border: 1px solid #ff3333;
            border-radius: 8px; padding: 25px; margin: 20px 0; display: none;
        }
        .debug-container h4 { color: #ff3333; text-transform: uppercase; margin-bottom: 15px; font-size: 1.2rem; }
        .debug-form { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; }
        .debug-form input {
            background: #001226; border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 8px 12px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; flex: 1; min-width: 200px;
        }
        .debug-form input:focus { border-color: #00f5ff; outline: none; }
        .debug-form button {
            background: #ff3333; color: #fff; border: none; padding: 8px 20px;
            border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .debug-form button:hover { background: #ff5555; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Monitoramento Tático de Equipe</h1>
        </div>

        <div id="status-display" class="status-panel">Estabelecendo link de dados...</div>

        <div id="debug-box" class="debug-container">
            <h4>⚠️ Erro de Autenticação (HTTP 401)</h4>
            <p>O Baserow rejeitou as credenciais fornecidas. Como você mencionou que o token funciona no seu app, ajuste os campos abaixo para testar em tempo real:</p>
            <div class="debug-form">
                <input type="text" id="input-token" placeholder="Cole o Token Aqui">
                <input type="text" id="input-table" placeholder="ID da Tabela">
                <button onclick="testarNovasCredenciais()">Forçar Conexão</button>
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <div class="grid-stats" id="stats-summary"></div>
            <div id="lojas-render-target"></div>
        </div>
    </div>

    <script>
        // CREDENCIAIS CORRIGIDAS (I maiúsculo trocado por l minúsculo)
        let CONFIG = {
            TABLE_ID: "180827",
            TOKEN: "x6rXtkpcBaAYlER6MMDo6Lfd0RSS28Ey" 
        };

        const statusDisplay = document.getElementById('status-display');
        const debugBox = document.getElementById('debug-box');
        const mainContent = document.getElementById('main-content');

        async function puxarDadosServidor() {
            try {
                statusDisplay.style.display = 'block';
                statusDisplay.innerText = "Sincronizando com a API Baserow...";
                
                const url = `https://api.baserow.io/api/database/rows/table/${CONFIG.TABLE_ID}/?user_field_names=true&size=100`;
                
                const response = await fetch(url, {
                    method: "GET",
                    headers: { 'Authorization': `Token ${CONFIG.TOKEN}` }
                });

                if (response.status === 401) {
                    statusDisplay.style.display = 'none';
                    debugBox.style.display = 'block';
                    document.getElementById('input-token').value = CONFIG.TOKEN;
                    document.getElementById('input-table').value = CONFIG.TABLE_ID;
                    return;
                }

                if (!response.ok) throw new Error(`Status HTTP: ${response.status}`);

                const data = await response.json();
                debugBox.style.display = 'none';
                statusDisplay.style.display = 'none';
                
                renderizarPainel(data.results || []);

            } catch (err) {
                statusDisplay.innerHTML = `<span style="color:#ff3333">Erro de Conexão: ${err.message}</span>`;
            }
        }

        function testarNovasCredenciais() {
            CONFIG.TOKEN = document.getElementById('input-token').value.trim();
            CONFIG.TABLE_ID = document.getElementById('input-table').value.trim();
            puxarDadosServidor();
        }

        function renderizarPainel(registros) {
            if(registros.length === 0) {
                statusDisplay.style.display = 'block';
                statusDisplay.innerText = "Aviso: Nenhum colaborador cadastrado nesta tabela.";
                return;
            }

            // Agrupamento
            const mapaLojas = {};
            let contagemTotal = 0;

            registros.forEach(item => {
                const local = item.Loja ? item.Loja.trim() : "LOJA NÃO DEFINIDA";
                if (!mapaLojas[local]) mapaLojas[local] = [];
                mapaLojas[local].push(item);
                contagemTotal++;
            });

            // Renderizar estatísticas superiores
            document.getElementById('stats-summary').innerHTML = `
                <div class="card-stat"><h3>Total Colaboradores</h3><div class="num">${contagemTotal}</div></div>
                <div class="card-stat"><h3>Lojas Conectadas</h3><div class="num">${Object.keys(mapaLojas).length}</div></div>
            `;

            // Renderizar seções por loja
            let htmlHTML = "";
            Object.keys(mapaLojas).sort().forEach(nomeLoja => {
                const equipe = mapaLojas[nomeLoja];
                htmlHTML += `
                    <div class="loja-box">
                        <div class="loja-title-bar">
                            <h2>${nomeLoja}</h2>
                            <div class="counter-badge">${equipe.length} INTEGRANTE(S)</div>
                        </div>
                        <div class="user-grid">
                `;

                equipe.forEach(colab => {
                    // Mapeamento dinâmico inteligente (Aceita Nome ou Email se Nome faltar)
                    const displayNome = colab.Nome || colab.Email || "Sem identificação";
                    const displayCargo = colab.Cargo || "Cargo não informado";
                    const displayDRT = colab.DRT ? `DRT: ${colab.DRT}` : "Sem Registro DRT";
                    
                    // Fallback de imagem usando as iniciais do nome caso a foto falhe ou venha vazia
                    const fotoValida = colab.Foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayNome)}&background=002347&color=00f5ff&bold=true`;

                    htmlHTML += `
                        <div class="user-card">
                            <div class="avatar">
                                <img src="${fotoValida}" onerror="this.src='https://ui-avatars.com/api/?name=Erro&background=ff3333&color=fff'">
                            </div>
                            <div class="info">
                                <div class="name">${displayNome}</div>
                                <div class="role">${displayCargo}</div>
                                <div class="drt">${displayDRT}</div>
                            </div>
                        </div>
                    `;
                });

                htmlHTML += `</div></div>`;
            });

            document.getElementById('lojas-render-target').innerHTML = htmlHTML;
            mainContent.style.display = 'block';
        }

        window.onload = puxarDadosServidor;
    </script>
</body>
</html>
