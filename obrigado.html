<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviado com Sucesso!</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        
        h1 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 0.5rem; line-height: 1.5; }
        
        /* Destaque para o prazo */
        .prazo {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 2rem !important;
        }

        .btn-voltar { 
            background: #007bff; 
            color: white; 
            text-decoration: none;
            padding: 15px 30px; 
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            width: 200px;
            text-align: center;
        }
        
        .btn-voltar:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div>
        <h1>Mensagem enviada!</h1>
        <p>Recebemos seu contato com sucesso.</p>
        <p>Por favor, <strong>fique de olho na sua caixa de entrada</strong>.</p>
        <p class="prazo">Responderemos por e-mail em até 3 dias úteis.</p>
        
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>
</body>
</html>
