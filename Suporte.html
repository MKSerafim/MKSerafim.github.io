<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <style>
        /* Fundo Blindado e Fonte do Sistema */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            max-width: 400px; 
            margin: 0 auto;
            background-color: #001f42; /* Azul oficial do app */
            color: #ffffff;
        }
        
        /* Título com leve efeito Neon */
        h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-top: 10px; 
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 6px rgba(0, 180, 216, 0.4);
        }
        
        /* Labels em Cian e Maiúsculas */
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-weight: bold; 
            color: #00b4d8;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Texto de Ajuda Escurecido */
        .help-text {
            font-size: 0.8rem;
            color: #8fa3b0;
            margin-bottom: 0.8rem;
            font-style: italic;
        }
        
        /* Caixas de Digitação Estilo HUD */
        input, textarea, select { 
            width: 100%; 
            margin-bottom: 1.5rem; 
            padding: 14px; 
            box-sizing: border-box; 
            border: 1px solid #002d5e; 
            border-radius: 8px;
            font-size: 15px;
            background-color: #001630; /* Fundo mais escuro para o campo */
            color: #ffffff;
            transition: all 0.2s ease;
        }

        /* Cor do texto quando o campo está vazio */
        input::placeholder, textarea::placeholder {
            color: #4a627a;
        }

        /* Cor de fundo das opções do seletor */
        option {
            background-color: #001630;
            color: #ffffff;
        }

        /* Efeito ao clicar no campo para digitar */
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #00b4d8;
            box-shadow: 0 0 8px rgba(0, 180, 216, 0.4);
        }
        
        /* Botão Pílula Tático */
        button { 
            background: linear-gradient(180deg, #0072ff 0%, #0044cc 100%);
            color: white; 
            border: none; 
            padding: 16px; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3), 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Efeito de clique no botão */
        button:active { 
            transform: scale(0.98);
            background: linear-gradient(180deg, #0044cc 0%, #002288 100%);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <h2>Entre em Contato</h2>
    
    <form action="https://formspree.io/f/mpqngqll" method="POST">
        
        <input type="hidden" name="_next" value="https://mkserafim.github.io/obrigado.html" />
        
        <label for="email">Seu E-mail:</label>
        <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com" />

        <label for="loja">Escolha sua Loja:</label>
        <select id="loja" name="loja" required>
            <option value="" disabled selected>Selecione uma loja...</option>
            <option value="VVS">VVS - Hiper Vila Velha</option>
            <option value="JFO">JFO - Hiper Juiz de Fora</option>
            <option value="HMC">HMC - Hiper Macaé</option>
            <option value="HCG">HCG - Hiper Campos dos Goytacazes</option>
            <option value="BHP">BHP - Hiper Pampulha</option>
            <option value="RJD">RJD - Washington Luiz</option>
        </select>

        <label for="id_conta">ID da Conta:</label>
        <p class="help-text">Não sabe seu ID? Acesse seu perfil, role até o final da página e copie a última informação exibida.</p>
        <input type="text" id="id_conta" name="id_conta" required placeholder="Digite seu ID aqui" />

        <label for="assunto">Assunto:</label>
        <select id="assunto" name="assunto" required>
            <option value="" disabled selected>Selecione o motivo...</option>
            <option value="suporte">Suporte</option>
            <option value="erro_ortografia">Relatar erro de ortografia</option>
            <option value="bug_login">Relatar bug de login</option>
            <option value="novo_colaborador">Pedir acesso para novo colaborador</option>
            <option value="excluir_conta">Excluir minha conta</option>
            <option value="erro_carregamento">Relatar erro de carregamento</option>
            <option value="novo_app_loja">Pedir o aplicativo pra outra loja</option>
            <option value="outros">Outros assuntos</option>
        </select>

        <label for="message">Sua Mensagem:</label>
        <textarea id="message" name="message" rows="4" required placeholder="Digite sua mensagem aqui..."></textarea>

        <button type="submit">Enviar Mensagem</button>
    </form>

</body>
</html>
