<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Atualizações</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
            color: #333;
        }

        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; display: inline-block; }

        .lista-atualizacoes {
            text-align: left;
            display: inline-block;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .lista-atualizacoes li { margin-bottom: 10px; }

        .botao-qrcode {
            background-color: #000;
            color: #fff;
            padding: 15px 30px;
            display: inline-block;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .qrcode-img {
            width: 250px; 
            height: auto;
            display: block;
            margin: 0 auto;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h2>Formulário de atualizações</h2>

    <div class="lista-atualizacoes">
        <ol>
            <li>Estatus de vencimento</li>
            <li>Blitz de validade</li>
            <li>Suporte</li>
            <li>Perfil</li>
            <li>Loja Macaé</li>
        </ol>
    </div>

    <div>
        <a href="#" class="botao-qrcode">QRCODE do aplicativo</a>
    </div>

    <img src="qrcode.png" alt="QR Code do Aplicativo" class="qrcode-img">

</body>
</html>
