<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Atualizações</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza tudo horizontalmente */
        }

        .container {
            max-width: 400px; /* Limita a largura no computador */
            width: 100%;      /* Usa toda a largura no celular */
            text-align: center;
        }

        h2 { 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 20px;
        }

        .lista-atualizacoes {
            text-align: left;
            margin: 0 auto 30px auto;
            display: inline-block; /* Mantém a lista alinhada à esquerda */
        }

        .lista-atualizacoes li { margin-bottom: 10px; font-size: 1.1rem; }

        .botao-qrcode {
            background-color: #000;
            color: #fff;
            padding: 15px 30px;
            display: block; /* Botão ocupa a largura da linha */
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .qrcode-img {
            width: 100%; 
            max-width: 250px; 
            height: auto;
            display: block;
            margin: 0 auto;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Formulário de atualizações</h2>

        <div class="lista-atualizacoes">
            <ol>
                <li>Estatus de vencimento</li>
                <li>Blitz de validade</li>
                <li>Suporte</li>
                <li>Perfil</li>
                <li>Loja Macaé</li>
            </ol>
        </div>

        <a href="#" class="botao-qrcode">QRCODE do aplicativo</a>

        <img src="qrcode.png" alt="QR Code do Aplicativo" class="qrcode-img">
    </div>

</body>
</html>
