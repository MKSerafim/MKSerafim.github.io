<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Riscos e Perdas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #002244; background-image: radial-gradient(circle at center, #01466d 0%, #001830 100%); height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; position: relative; }
        .status-bar-sim { width: 100%; height: 24px; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 0.75rem; opacity: 0.8; }
        .header { text-align: center; margin-top: 10px; margin-bottom: 20px; color: white; z-index: 10; }
        .header img { width: 50px; height: auto; margin-bottom: 5px; }
        .header h1 { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.5px; margin-top: 5px; }
        .robot-container { width: 100%; max-width: 400px; margin-top: 10px; margin-bottom: -50px; z-index: 5; display: flex; justify-content: center; }
        .robot-container img { width: 100%; height: auto; object-fit: contain; }
        .login-card { background-color: white; width: 90%; max-width: 360px; border-radius: 12px; padding: 30px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 10; }
        .login-card h2 { text-align: center; color: #333; margin-bottom: 25px; font-size: 1.5rem; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-size: 0.9rem; font-weight: 500; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .input-group input:focus { border-color: #003087; }
        .toggle-password { position: absolute; right: 15px; top: 38px; cursor: pointer; color: #666; font-size: 0.9rem; background: none; border: none; }
        .btn-login { width: 100%; background-color: #003087; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        .btn-login:disabled { background-color: #7f98c2; }
        .forgot-password-container { text-align: center; margin-top: 15px; }
        .forgot-password { color: #003087; text-decoration: underline; font-size: 0.95rem; cursor: pointer; }
        .footer-text { position: absolute; bottom: 10px; color: rgba(255, 255, 255, 0.6); font-size: 0.75rem; text-align: center; z-index: 10; }
        #aviso-toast { visibility: hidden; min-width: 250px; background-color: #fb131b; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 30; left: 50%; bottom: 20px; transform: translateX(-50%); font-size: 0.95rem; font-weight: 500; box-shadow: 0px 4px 15px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #aviso-toast.mostrar { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>
    <div class="status-bar-sim"><span>16:55</span><div style="display:flex;gap:8px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span>82%</span></div></div>
    <div class="header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Carrefour_logo_white.svg" alt="Carrefour Logo"> 
        <h1>SISTEMA DE GESTÃO DE RISCOS E PERDAS</h1>
    </div>
    <div class="robot-container">
                <img src="https://raw.githubusercontent.com/mkserafim/Carrefour_Risk_Management/main/bonequinhos.png" alt="Risco e Perdas Robots">
    </div>
    <div class="login-card">
        <h2>Entrar</h2>
        <div class="input-group">
            <label for="email">Endereço de e-mail</label>
            <input type="email" id="email" placeholder="exemplo@carrefour.com" required>
        </div>
        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••••" required>
            <button type="button" class="toggle-password" onclick="toggleSenha()">Mostrar</button>
        </div>
        <div style="display:flex;align-items:center;margin-bottom:20px;font-size:0.9rem;color:#333;"><input type="checkbox" id="termos" style="margin-right:10px;"><label for="termos">Aceito os <a href="https://mkserafim.github.io/Termos.html" style="color:#003087;text-decoration:underline;">Termos e Condições</a></label></div>
        <button class="btn-login" id="btnEntrar" onclick="fazerLogin()">ENTRAR</button>
        <div class="forgot-password-container"><a href="#" class="forgot-password" onclick="mostrarAviso('Função de recuperação em desenvolvimento.')">Esqueci a senha?</a></div>
    </div>
    <div class="footer-text">Versão (1.0) Alfa | DV: Maykom Rodrigues Serafim</div>
    <div id="aviso-toast">Mensagem de erro aqui</div>
    <script>
        function toggleSenha() { const i = document.getElementById('senha'), b = document.querySelector('.toggle-password'); if (i.type === 'password') { i.type = 'text'; b.textContent = 'Ocultar'; } else { i.type = 'password'; b.textContent = 'Mostrar'; } }
        function mostrarAviso(m) { const t = document.getElementById("aviso-toast"); t.textContent = m; t.className = "mostrar"; setTimeout(function(){ t.className = t.className.replace("mostrar", ""); }, 3500); }
        async function fazerLogin() { const e = document.getElementById('email').value.trim(), s = document.getElementById('senha').value.trim(), c = document.getElementById('termos').checked, b = document.getElementById('btnEntrar'); if (!e || !s) { mostrarAviso("Preencha o e-mail e a senha."); return; } if (!c) { mostrarAviso("Você precisa aceitar os Termos e Condições."); return; } b.textContent = "CARREGANDO..."; b.disabled = true; try { const r = await fetch(`https://api.baserow.io/api/database/rows/table/180827/?user_field_names=true&search=${encodeURIComponent(e)}`, { headers: { "Authorization": "Token x6rXtkpcBaAYlER6MMDo6Lfd0RSS28Ey" } }); const d = await r.json(); if (d.count === 0) { mostrarAviso("E-mail ou senha incorretos."); b.textContent = "ENTRAR"; b.disabled = false; return; } const u = d.results.find(row => row.Email === e && row.Senha === s); if (u) { let f = ""; if (typeof u.Foto === "string") { f = u.Foto; } else if (Array.isArray(u.Foto) && u.Foto.length > 0) { f = u.Foto[0].url; } const l = [u.Nome||"Não informado", e, u.DRT||"Sem DRT", u.Cargo||"Sem cargo", f, u.Loja||"Sem loja", u.ID||u.id]; const t = JSON.stringify(l); if (window.AppInventor) { window.AppInventor.setWebViewString(t); } else { console.log("Sucesso:", t); mostrarAviso("Login efetuado com sucesso!"); b.textContent = "ENTRAR"; b.disabled = false; } } else { mostrarAviso("E-mail ou senha incorretos."); b.textContent = "ENTRAR"; b.disabled = false; } } catch (err) { mostrarAviso("Erro de conexão. Verifique sua internet."); b.textContent = "ENTRAR"; b.disabled = false; } }
    </script>
</body>
</html>
