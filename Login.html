<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prevenção de Perdas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #002244;
            background-image: radial-gradient(circle at center, #01466d 0%, #001830 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .login-card {
            background-color: white;
            width: 90%;
            max-width: 360px;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group input[type="email"],
        .input-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #003087;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #666;
            font-size: 0.9rem;
            background: none;
            border: none;
        }

        /* ----- ESTILO DOS TERMOS E CONDIÇÕES ----- */
        .termos-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #333;
        }

        .termos-group input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .termos-group a {
            color: #003087;
            text-decoration: underline;
            font-weight: 500;
        }
        /* ----------------------------------------- */

        .btn-login {
            width: 100%;
            background-color: #003087;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-login:disabled {
            background-color: #7f98c2;
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            text-align: center;
        }

        #aviso-toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #fb131b; 
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 10;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #aviso-toast.mostrar {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <h1>SISTEMA DE GESTÃO DE RISCOS E PERDAS</h1>
    </div>

    <div class="login-card">
        <h2>Entrar</h2>
        
        <div class="input-group">
            <label for="email">Endereço de e-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••••" required>
            <button type="button" class="toggle-password" onclick="toggleSenha()">Mostrar</button>
        </div>

        <div class="termos-group">
            <input type="checkbox" id="termos">
            <label for="termos">Aceito os <a href="https://mkserafim.github.io/Termos.html" target="_blank">Termos e Condições</a></label>
        </div>

        <button class="btn-login" id="btnEntrar" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div class="footer-text">
        Versão (1.0) Alfa | DV: Maykom Rodrigues Serafim
    </div>

    <div id="aviso-toast">Mensagem de erro aqui</div>

    <script>
        function toggleSenha() {
            const inputSenha = document.getElementById('senha');
            const btnToggle = document.querySelector('.toggle-password');
            if (inputSenha.type === 'password') {
                inputSenha.type = 'text';
                btnToggle.textContent = 'Ocultar';
            } else {
                inputSenha.type = 'password';
                btnToggle.textContent = 'Mostrar';
            }
        }

        function mostrarAviso(mensagem) {
            const toast = document.getElementById("aviso-toast");
            toast.textContent = mensagem;
            toast.className = "mostrar";
            setTimeout(function(){ 
                toast.className = toast.className.replace("mostrar", ""); 
            }, 3500);
        }

        const TOKEN = "x6rXtkpcBaAYlER6MMDo6Lfd0RSS28Ey";
        const TABLE_ID = "180827";
        const API_URL = `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=true`;

        async function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const termosAceitos = document.getElementById('termos').checked;
            const btn = document.getElementById('btnEntrar');

            // Verifica se os campos estão preenchidos
            if (!email || !senha) {
                mostrarAviso("Por favor, preencha o e-mail e a senha.");
                return;
            }

            // Verifica se os termos foram aceitos
            if (!termosAceitos) {
                mostrarAviso("Você precisa aceitar os Termos e Condições para entrar.");
                return;
            }

            btn.textContent = "CARREGANDO...";
            btn.disabled = true;

            try {
                const resposta = await fetch(`${API_URL}&search=${encodeURIComponent(email)}`, {
                    headers: {
                        "Authorization": `Token ${TOKEN}`
                    }
                });

                const dados = await resposta.json();

                if (dados.count === 0) {
                    mostrarAviso("E-mail ou senha incorretos.");
                    btn.textContent = "ENTRAR";
                    btn.disabled = false;
                    return;
                }

                const usuario = dados.results.find(row => row.Email === email && row.Senha === senha);

                if (usuario) {
                    let urlFoto = "";
                    if (typeof usuario.Foto === "string") {
                        urlFoto = usuario.Foto;
                    } else if (Array.isArray(usuario.Foto) && usuario.Foto.length > 0) {
                        urlFoto = usuario.Foto[0].url;
                    }

                    const listaParaKodular = [
                        usuario.Nome || "Não informado",
                        usuario.Email || email,
                        usuario.DRT || "Sem DRT",
                        usuario.Cargo || "Sem cargo",
                        urlFoto,
                        usuario.Loja || "Sem loja",
                        usuario.ID || usuario.id
                    ];

                    const dadosEmTexto = JSON.stringify(listaParaKodular);

                    if (window.AppInventor) {
                        window.AppInventor.setWebViewString(dadosEmTexto);
                    } else {
                        console.log("Sucesso:", dadosEmTexto);
                        mostrarAviso("Login efetuado com sucesso!");
                        btn.textContent = "ENTRAR";
                        btn.disabled = false;
                    }
                } else {
                    mostrarAviso("E-mail ou senha incorretos.");
                    btn.textContent = "ENTRAR";
                    btn.disabled = false;
                }

            } catch (erro) {
                mostrarAviso("Erro de conexão. Verifique sua internet.");
                console.error(erro);
                btn.textContent = "ENTRAR";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
