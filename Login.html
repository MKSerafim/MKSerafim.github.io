<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prevenção de Perdas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #002244; /* Azul escuro corporativo */
            background-image: radial-gradient(circle at center, #01466d 0%, #001830 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Cabeçalho com Logo (usando um placeholder em texto, mas você pode trocar por imagem) */
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        /* Cartão de Login */
        .login-card {
            background-color: white;
            width: 90%;
            max-width: 360px;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #003087;
        }

        /* Botão de mostrar senha */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #666;
            font-size: 0.9rem;
            background: none;
            border: none;
        }

        .btn-login {
            width: 100%;
            background-color: #003087; /* Azul Carrefour */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-login:disabled {
            background-color: #7f98c2;
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <h1>SISTEMA DE GESTÃO DE RISCOS E PERDAS</h1>
    </div>

    <div class="login-card">
        <h2>Entrar</h2>
        
        <div class="input-group">
            <label for="email">Endereço de e-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••••" required>
            <button type="button" class="toggle-password" onclick="toggleSenha()">Mostrar</button>
        </div>

        <button class="btn-login" id="btnEntrar" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div class="footer-text">
        Versão (1.0) Alfa | DV: Maykom Rodrigues Serafim
    </div>

    <script>
        // Função para mostrar/esconder senha
        function toggleSenha() {
            const inputSenha = document.getElementById('senha');
            const btnToggle = document.querySelector('.toggle-password');
            if (inputSenha.type === 'password') {
                inputSenha.type = 'text';
                btnToggle.textContent = 'Ocultar';
            } else {
                inputSenha.type = 'password';
                btnToggle.textContent = 'Mostrar';
            }
        }

        // Credenciais do Baserow que você enviou
        const TOKEN = "x6rXtkpcBaAYlER6MMDo6Lfd0RSS28Ey";
        const TABLE_ID = "180827";
        const API_URL = `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=true`;

        async function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const btn = document.getElementById('btnEntrar');

            if (!email || !senha) {
                alert("Por favor, preencha o e-mail e a senha.");
                return;
            }

            // Muda o botão para estado de carregamento
            btn.textContent = "CARREGANDO...";
            btn.disabled = true;

            try {
                // Faz a busca no Baserow pesquisando pelo E-mail
                const resposta = await fetch(`${API_URL}&search=${encodeURIComponent(email)}`, {
                    headers: {
                        "Authorization": `Token ${TOKEN}`
                    }
                });

                const dados = await resposta.json();

                // Verifica se encontrou algum usuário
                if (dados.count === 0) {
                    alert("E-mail ou senha incorretos.");
                    btn.textContent = "ENTRAR";
                    btn.disabled = false;
                    return;
                }

                // Procura na resposta a linha que tem o e-mail E a senha exatos
                const usuario = dados.results.find(row => row.Email === email && row.Senha === senha);

                if (usuario) {
                    // Trata a foto caso seja um anexo (Array) no Baserow ou apenas um Link de texto
                    let urlFoto = "";
                    if (typeof usuario.Foto === "string") {
                        urlFoto = usuario.Foto;
                    } else if (Array.isArray(usuario.Foto) && usuario.Foto.length > 0) {
                        urlFoto = usuario.Foto[0].url;
                    }

                    // Monta a LISTA na EXATA ordem que a sua Tela_inicial espera:
                    // 1: Nome, 2: Email, 3: DRT, 4: Cargo, 5: Foto, 6: Loja, 7: ID
                    const listaParaKodular = [
                        usuario.Nome || "Não informado",
                        usuario.Email || email,
                        usuario.DRT || "Sem DRT",
                        usuario.Cargo || "Sem cargo",
                        urlFoto,
                        usuario.Loja || "Sem loja",
                        usuario.ID || usuario.id // Pega a coluna ID ou o ID interno do Baserow
                    ];

                    // Transforma a lista em formato de texto (JSON) para enviar pela linha secreta
                    const dadosEmTexto = JSON.stringify(listaParaKodular);

                    // Envia para o Kodular
                    if (window.AppInventor) {
                        window.AppInventor.setWebViewString(dadosEmTexto);
                    } else {
                        // Se abrir no computador só para testar:
                        console.log("Sucesso! Dados que seriam enviados ao app:", dadosEmTexto);
                        alert("Login efetuado com sucesso!");
                        btn.textContent = "ENTRAR";
                        btn.disabled = false;
                    }
                } else {
                    alert("E-mail ou senha incorretos.");
                    btn.textContent = "ENTRAR";
                    btn.disabled = false;
                }

            } catch (erro) {
                alert("Erro de conexão. Verifique sua internet.");
                console.error(erro);
                btn.textContent = "ENTRAR";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
