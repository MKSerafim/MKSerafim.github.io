<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Riscos e Perdas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #052d49 0%, #001c30 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h3 { font-size: 14px; letter-spacing: 2px; color: #a0c4ff; text-transform: uppercase; margin-bottom: 5px; }
        .header h1 { font-size: 20px; font-weight: bold; letter-spacing: 0.5px; }
        .card { background: #ffffff; color: #333; width: 100%; max-width: 400px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #555; }
        .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; background: #f9f9f9; transition: all 0.3s; }
        .input-group input:focus { border-color: #052d49; background: #fff; outline: none; }
        .password-toggle { position: absolute; right: 16px; top: 38px; color: #777; cursor: pointer; font-size: 14px; user-select: none; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 25px; font-size: 14px; color: #555; }
        .checkbox-group input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group a { color: #052d49; text-decoration: underline; }
        .btn-submit { width: 100%; padding: 14px; background: #002244; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #052d49; }
        .btn-submit:disabled { background: #cccccc; cursor: not-allowed; }
        
        /* Modal Customizado igual ao erro do App */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; color: #333; width: 85%; max-width: 320px; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: popup 0.2s ease-out; }
        @keyframes popup { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-text { font-size: 16px; margin-bottom: 20px; color: #333; line-height: 1.4; font-weight: 500; }
        .modal-btn { width: 100%; padding: 12px; background: #002663; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h3>Carrefour</h3>
        <h1>SISTEMA DE GESTÃO DE RISCOS E PERDAS</h1>
    </div>

    <div class="card">
        <form id="loginForm" onsubmit="executarLogin(event)">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="seuemail@carrefour.com">
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="Digite sua senha">
                <span class="password-toggle" onclick="toggleSenha()">Mostrar</span>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="termos" required checked>
                <label for="termos">Aceito os <a href="#">Termos e Condições</a></label>
            </div>

            <button type="submit" id="btnEntrar" class="btn-submit">ENTRAR</button>
        </form>
    </div>

    <div id="errorModal" class="modal-overlay">
        <div class="modal">
            <div id="modalMsg" class="modal-text">Erro no sistema: Failed to fetch</div>
            <button class="modal-btn" onclick="fecharModal()">OK</button>
        </div>
    </div>

    <script>
        // Endpoint absoluto do seu projeto hospedado no Vercel
        const URL_DA_SUA_API = "https://mk-serfim-github-io.vercel.app/api/login";

        function toggleSenha() {
            const senhaInput = document.getElementById('senha');
            const toggleText = document.querySelector('.password-toggle');
            if (senhaInput.type === 'password') {
                senhaInput.type = 'text';
                toggleText.textContent = 'Ocultar';
            } else {
                senhaInput.type = 'password';
                toggleText.textContent = 'Mostrar';
            }
        }

        function mostrarErro(mensagem) {
            document.getElementById('modalMsg').textContent = mensagem;
            document.getElementById('errorModal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('errorModal').style.display = 'none';
        }

        async function executarLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btnEntrar = document.getElementById('btnEntrar');

            // Ativa o estado visual de carregamento
            btnEntrar.disabled = true;
            btnEntrar.textContent = "CARREGANDO...";

            try {
                const resposta = await fetch(URL_DA_SUA_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const resultado = await resposta.json();

                if (resposta.ok && resultado.success) {
                    const u = resultado.usuario;
                    
                    // Estruturação do Array de dados do usuário exatamente como esperado pelo app
                    const listaParaKodular = [u.Nome, u.Email, u.DRT, u.Cargo, u.Foto, u.Loja, u.id];

                    // Objeto envelopado contendo o status explícito de sucesso
                    const pacoteKodular = {
                        status: "sucesso",
                        payload: listaParaKodular
                    };

                    // Transmite os dados de volta para o componente WebView do Kodular
                    if (window.AppInventor) {
                        window.AppInventor.setWebViewString(JSON.stringify(pacoteKodular));
                    } else {
                        console.log("Sucesso! Dados prontos para o Kodular:", pacoteKodular);
                        alert("Login efetuado com sucesso (Executado fora do App).");
                    }
                } else {
                    mostrarErro(resultado.message || "E-mail ou senha incorretos.");
                }

            } catch (error) {
                mostrarErro("Erro no sistema: Failed to fetch");
            } finally {
                btnEntrar.disabled = false;
                btnEntrar.textContent = "ENTRAR";
            }
        }
    </script>
</body>
</html>
