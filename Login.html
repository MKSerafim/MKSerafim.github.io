<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Riscos e Perdas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #002244;
            background-image: radial-gradient(circle at center, #01466d 0%, #001830 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Evita barras de rolagem */
            position: relative;
        }

        /* ----- Barra de Status Superior (Simulada para visualização) ----- */
        .status-bar {
            width: 100%;
            height: 24px;
            background-color: transparent;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 0.75rem;
            opacity: 0.8;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }

        .status-bar-icons {
            display: flex;
            gap: 8px;
        }

        /* ----- Cabeçalho com Logotipo e Título ----- */
        .header {
            text-align: center;
            margin-top: 40px; /* Espaço para a barra de status */
            margin-bottom: 20px;
            color: white;
            z-index: 10;
        }

        .header img {
            width: 60px;
            height: auto;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        /* ----- Contêiner dos Robôs (A imagem gerada) ----- */
        .robot-container {
            width: 100%;
            max-width: 400px; /* Ajuste para o tamanho da sua imagem */
            margin-top: 10px;
            margin-bottom: -50px; /* Sobrepõe levemente o cartão de login */
            z-index: 5;
            display: flex;
            justify-content: center;
        }

        .robot-container img {
            width: 100%;
            height: auto;
            max-height: 180px; /* Ajuste a altura máxima desejada */
        }

        /* ----- Cartão de Login ----- */
        .login-card {
            background-color: white;
            width: 90%;
            max-width: 360px;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .login-card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #003087;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #666;
            font-size: 0.9rem;
            background: none;
            border: none;
        }

        /* ----- ESTILOS DOS TERMOS E CONDIÇÕES ----- */
        .terms-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #333;
        }

        .terms-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .terms-group label {
            cursor: pointer;
        }

        .terms-link {
            color: #333;
            text-decoration: underline;
        }

        /* ----- ESTILO DO BOTÃO DE LOGIN ----- */
        .btn-login {
            width: 100%;
            background-color: #003087;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-login:disabled {
            background-color: #7f98c2;
        }

        /* ----- ESTILO DO ESQUECI A SENHA ----- */
        .forgot-password-container {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-password {
            color: #003087;
            text-decoration: underline;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* ----- Rodapé ----- */
        .footer-text {
            position: absolute;
            bottom: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            text-align: center;
            z-index: 10;
        }

        /* ----- ESTILO DO NOVO AVISO (TOAST) ----- */
        #aviso-toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #fb131b;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 30;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #aviso-toast.mostrar {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>16:55</span>
        <div class="status-bar-icons">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span>82%</span>
        </div>
    </div>

    <div class="header">
        <img src="path/to/your/carrefour_logo.png" alt="Carrefour Logo"> 
        <h1>SISTEMA DE GESTÃO DE RISCOS E PERDAS</h1>
    </div>

    <div class="robot-container">
        <img src="bonequinhos.png" alt="Bonecos de Risco e Perda">
    </div>

    <div class="login-card">
        <h2>Entrar</h2>
        
        <div class="input-group">
            <label for="email">Endereço de e-mail</label>
            <input type="email" id="email" placeholder="exemplo@carrefour.com" required>
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••••" required>
            <button type="button" class="toggle-password" onclick="toggleSenha()">Mostrar</button>
        </div>

        <div class="terms-group">
            <input type="checkbox" id="termos">
            <label for="termos">Aceito os <a href="https://mkserafim.github.io/Termos.html" class="terms-link" target="_blank">Termos e Condições</a></label>
        </div>

        <button class="btn-login" id="btnEntrar" onclick="fazerLogin()">ENTRAR</button>

        <div class="forgot-password-container">
            <a href="#" class="forgot-password" onclick="mostrarAviso('Função de recuperação em desenvolvimento.')">Esqueci a senha?</a>
        </div>
    </div>

    <div class="footer-text">
        Versão (1.0) Alfa | DV: Maykom Rodrigues Serafim
    </div>

    <div id="aviso-toast">Mensagem de erro aqui</div>

    <script>
        function toggleSenha() {
            const inputSenha = document.getElementById('senha');
            const btnToggle = document.querySelector('.toggle-password');
            if (inputSenha.type === 'password') {
                inputSenha.type = 'text';
                btnToggle.textContent = 'Ocultar';
            } else {
                inputSenha.type = 'password';
                btnToggle.textContent = 'Mostrar';
            }
        }

        // Função que controla o visual do aviso
        function mostrarAviso(mensagem) {
            const toast = document.getElementById("aviso-toast");
            toast.textContent = mensagem;
            toast.className = "mostrar";
            // Esconde o aviso automaticamente após 3.5 segundos
            setTimeout(function(){ 
                toast.className = toast.className.replace("mostrar", ""); 
            }, 3500);
        }

        const TOKEN = "x6rXtkpcBaAYlER6MMDo6Lfd0RSS28Ey";
        const TABLE_ID = "180827";
        const API_URL = `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=true`;

        async function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const termosChecados = document.getElementById('termos').checked; // Pega o status do checkbox
            const btn = document.getElementById('btnEntrar');

            // Validações iniciais
            if (!email || !senha) {
                mostrarAviso("Por favor, preencha o e-mail e a senha.");
                return;
            }

            // Validação dos Termos e Condições
            if (!termosChecados) {
                mostrarAviso("Você precisa aceitar os Termos e Condições para entrar.");
                return;
            }

            btn.textContent = "CARREGANDO...";
            btn.disabled = true;

            try {
                const resposta = await fetch(`${API_URL}&search=${encodeURIComponent(email)}`, {
                    headers: {
                        "Authorization": `Token ${TOKEN}`
                    }
                });

                const dados = await resposta.json();

                if (dados.count === 0) {
                    mostrarAviso("E-mail ou senha incorretos.");
                    btn.textContent = "ENTRAR";
                    btn.disabled = false;
                    return;
                }

                const usuario = dados.results.find(row => row.Email === email && row.Senha === senha);

                if (usuario) {
                    let urlFoto = "";
                    if (typeof usuario.Foto === "string") {
                        urlFoto = usuario.Foto;
                    } else if (Array.isArray(usuario.Foto) && usuario.Foto.length > 0) {
                        urlFoto = usuario.Foto[0].url;
                    }

                    const listaParaKodular = [
                        usuario.Nome || "Não informado",
                        usuario.Email || email,
                        usuario.DRT || "Sem DRT",
                        usuario.Cargo || "Sem cargo",
                        urlFoto,
                        usuario.Loja || "Sem loja",
                        usuario.ID || usuario.id
                    ];

                    const dadosEmTexto = JSON.stringify(listaParaKodular);

                    if (window.AppInventor) {
                        window.AppInventor.setWebViewString(dadosEmTexto);
                    } else {
                        console.log("Sucesso:", dadosEmTexto);
                        mostrarAviso("Login efetuado com sucesso!");
                        btn.textContent = "ENTRAR";
                        btn.disabled = false;
                    }
                } else {
                    mostrarAviso("E-mail ou senha incorretos.");
                    btn.textContent = "ENTRAR";
                    btn.disabled = false;
                }

            } catch (erro) {
                mostrarAviso("Erro de conexão. Verifique sua internet.");
                console.error(erro);
                btn.textContent = "ENTRAR";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
